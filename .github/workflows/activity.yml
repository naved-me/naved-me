name: Update README with recent commits

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git log

      - name: Generate commit list
        run: |
          COMMITS=$(git log -10 --pretty=format:"- [\`%h\`](../../commit/%H) %s _(%ar)_")
          
          awk -v commits="$COMMITS" '
            /<!--START_SECTION:commits-->/ { print; print commits; skip=1; next }
            /<!--END_SECTION:commits-->/ { skip=0 }
            !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update recent commits in README"
          git push
