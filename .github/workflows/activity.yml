name: Update Recent Repositories

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Fetch Repos and Update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS=$(gh repo list $GITHUB_REPOSITORY_OWNER --sort updated --limit 5 --source --json name,url,description -q 'map("- [" + .name + "](" + .url + ")" + (if (.description != null and .description != "") then " - " + .description else "" end)) | join("\n")')
          
          if [ -z "$REPOS" ]; then
            echo "No repositories found."
            exit 0
          fi
          
          export REPOS_DATA="$REPOS"
          perl -0777 -pi -e 's/<!--START_SECTION:repos-->.*?<!--END_SECTION:repos-->/<!--START_SECTION:repos-->\n$ENV{REPOS_DATA}\n<!--END_SECTION:repos-->/s' README.md

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update recent repositories" || echo "No changes to commit"
          git push
